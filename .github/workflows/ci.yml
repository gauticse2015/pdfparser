name: CI

on:
  push:
    branches: [main, master]
  # All PR bases (including stacked review branches), not only main.
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        rust: [stable]

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Format
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Test
        run: cargo test --workspace

      - name: Build release CLI
        run: cargo build --release -p pdfparser-cli


  # Policy: never allow ICDAR competition PDFs/gold under benchmark data trees
  assert-no-icdar:
    name: Assert no ICDAR in corpus
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run assert_no_icdar
        run: python3 benchmark/scripts/assert_no_icdar.py

  # Optional lightweight smoke: ensure CLI runs on a committed fixture
  cli-smoke:
    name: CLI smoke
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build & extract sample
        run: |
          cargo build --release -p pdfparser-cli
          ./target/release/pdfparser extract benchmark/corpus/01_simple_text.pdf | grep -q SIMPLE_TOKEN_ALPHA

  # Real-track freeze gates (G5.5). Uses **committed** latest JSON so this PR
  # can merge independently of the engine binary. Nightly/local should re-run
  # detect_discipline / real_structure with the product CLI after engine lands.
  real-track-gates:
    name: Real-track phase gates
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Phase gates 1–2 (hard, committed results)
        run: |
          python3 benchmark/scripts/check_phase_gates.py --phase 1
          python3 benchmark/scripts/check_phase_gates.py --phase 2
      - name: Phase gates 3–5 (report only; not yet green)
        continue-on-error: true
        run: |
          python3 benchmark/scripts/check_phase_gates.py --phase 3
          python3 benchmark/scripts/check_phase_gates.py --phase 4
          python3 benchmark/scripts/check_phase_gates.py --phase 5
